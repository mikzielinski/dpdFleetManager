name: Deploy staging (UiPath)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver nupkg (puste = version z package.json)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to UiPath staging
        env:
          UIPATH_ACCESS_TOKEN: ${{ secrets.UIPATH_ACCESS_TOKEN }}
          UIPATH_REFRESH_TOKEN: ${{ secrets.UIPATH_REFRESH_TOKEN }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            node scripts/deploy-staging.mjs "${{ inputs.version }}"
          else
            node scripts/deploy-staging.mjs
          fi
